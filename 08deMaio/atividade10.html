<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsividade CSS</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f0f0;
      padding: 30px;
    }

    h1{
      margin-bottom: 20px;
      color: #222;
    }

    .container{
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .caixa{
      background: white;
      width: 300px;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .caixa h2{
      margin-bottom: 10px;
      color: #0077cc;
    }

    /* RESPONSIVIDADE */
    @media (max-width: 768px){
      .container{
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <h1>Responsividade CSS</h1>

  <div class="container">

    <div class="caixa">
      <h2>Caixa 1</h2>
      <p>Conteúdo da primeira caixa.</p>
    </div>

    <div class="caixa">
      <h2>Caixa 2</h2>
      <p>Conteúdo da segunda caixa.</p>
    </div>

    <div class="caixa">
      <h2>Caixa 3</h2>
      <p>Conteúdo da terceira caixa.</p>
    </div>

  </div>

</body>
</html>
