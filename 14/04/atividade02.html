<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <style>
        body {
            background-color: #0f172a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: white;
            font-size: 18px;
        }

        .foto {
            width: 140px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .link-container a {
            text-decoration: none;
            color: #4f6bf7;
            font-size: 10px;
        }

        .hobbies h2 {
            color: white;
            font-size: 14px;
            margin-top: 15px;
        }

        .hobbies ul {
            list-style: none;
            padding: 0;
        }

        .hobbies li {
            color: #cbd5e1;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Victor Hugo Olimpio Borba Cunha</h1>

    <img 
        class="foto"
        src="https://cdn.myanimelist.net/images/characters/3/516706.jpg"
        alt="Sukuna - Jujutsu Kaisen"
        onerror="this.onerror=null;this.src='https://via.placeholder.com/140?text=Sukuna';"
    >

    <div class="link-container">
        <a href="https://www.instagram.com/vholimpo_" target="_blank">
             Instagram @vholimpo_
        </a>
    </div>

    <div class="hobbies">
        <h2>Meus hobbies</h2>
        <ul>
            <li>Programar</li>
            <li>Ouvir músicas</li>
            <li>Jogar videogames</li>
        </ul>
    </div>

</div>

</body>
</html>
